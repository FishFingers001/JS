<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>  Przykład użycia pętli </title>
  <script language="JavaScript">
    let a_mic=6;
    let b_mic=22;
    for ( let i_mic=0; i_mic<=b_mic; i_mic++)
    {
      document.write("*");
    }
    document.write("<br>");
    for(let j_mic=0 ; j_mic<=a_mic-2 ; j_mic++)
    {
      let spacje_mic = new Array(b_mic).join("&nbsp;&nbsp;");
      document.write("*"+spacje_mic+"*<br>");
    }
    for (let i_mic=0; i_mic<=b_mic; i_mic++)
    {
      document.write("*");
    }
  </script>
</head>
<body>
</body>
</html>
