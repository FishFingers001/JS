<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<script>
    let n = parseInt(prompt("Podaj liczbe do obliczenia silni"));
    let suma = 1;
    for (let i = 1; i <= n; i++)
        suma = suma * i;
    document.write(suma);
</script>
</body>
</html>
