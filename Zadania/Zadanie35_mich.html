<!DOCTYPE html>
<meta charset="utf-8">
<html lang="pl-PL">
<title> Z35 Michałowski </title>
<body>
<div style="color:red;font-size:50px;">
    <script language="JavaScript">
        let x=prompt("podaj liczbę x=","");
        let a_dana_mic=parseFloat(x);
        document.write("czytana liczba x="+a_dana_mic+"<br>");
        if(a_dana_mic>0)
            document.write("czytana liczba jest większa od 0"+"<br>");
        if(a_dana_mic<0)
            document.write("czytana liczba jest większa od 0"+"<br>");
        if(a_dana_mic==0)
            document.write("czytana liczba jest większa od 0"+"<br>");
    </script>
</div>
</body>
</html>
