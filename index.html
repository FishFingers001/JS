    function button(a) {

        for (let i = 1; i <= a; i++) {
            document.write(`<input type="button" name="zadanie${i}" value="zadanie${i}" onclick="WinOpen_zad('Zadania/Zadanie${i}_mich.html')">`);
        }
    }

    let b = 56
    button(b);
